<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>読み込み中...</title>
<style>
  :root {
    --zoom-speed: 1.2s;   /* 画像Bが迫ってくる速度 */
    --flip-speed: 0.5s;  /* 左右反転の速度 */
  }

  body {
    margin: 0;
    padding: 0;
    background-color: #000; /* 背景を黒にして、余白を目立たなくする */
    overflow: hidden;
    overscroll-behavior: none; 
    touch-action: none;
  }
  
  img {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    
    /* * 【重要】
     * `cover` から `contain` に変更しました。
     * これで画像全体が画面内に収まり、歪んだり見切れたりしません。
     * 画面と画像の縦横比が異なる場合、余白ができます。
     */
    object-fit: contain; 
    
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  #img-a {
    z-index: 10;
  }
  
  #img-b {
    z-index: 20;
    visibility: hidden;
    transform: scale(0.01);
  }

  .scare-action {
    visibility: visible !important;
    animation: 
      zoomIn var(--zoom-speed) forwards, 
      flipShake var(--flip-speed) var(--zoom-speed) alternate 6;
  }

  @keyframes zoomIn {
    0% { transform: scale(0.01); }
    /* * 画像Bが「contain」で表示された状態からさらに大きく拡大します。
     * 拡大後は画面をはみ出すかもしれませんが、それは「急接近」の演出です。
     */
    100% { transform: scale(1.5); } 
  }

  @keyframes flipShake {
    0% { transform: scaleX(1.5) scaleY(1.5); }
    100% { transform: scaleX(-1.5) scaleY(1.5); }
  }
</style>
</head>
<body>

<img id="img-a" src="imageA.jpg" alt="画像A">
<img id="img-b" src="imageBB.jpg" alt="画像B">

<script>
  window.addEventListener('load', () => {
    const imgA = document.getElementById('img-a');
    const imgB = document.getElementById('img-b');

    // 2000ミリ秒（2秒）後に発動
    setTimeout(() => {
      imgA.style.display = 'none';
      imgB.classList.add('scare-action');
    }, 3500);
  });
</script>

</body>
</html>
