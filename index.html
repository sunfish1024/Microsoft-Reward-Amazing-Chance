<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み込み中...</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
  }
  
  /* 画像A (最初の画像) */
  #img-a {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    object-fit: cover;
    z-index: 10;
  }
  
  /* 画像B (びっくり画像) */
  #img-b {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    object-fit: cover;
    z-index: 20;
    visibility: hidden; /* 最初は隠しておく */
    transform: scale(0.01); /* 見えないくらい小さくしておく */
  }

  /* ズームと反転の連続アニメーション設定 */
  .scare-action {
    visibility: visible !important;
    /* 1. 最初の0.1秒で拡大 (zoomIn) 
       2. 0.1秒遅れて(拡大後に) 0.05秒間隔で反転を6回繰り返す (flipShake) */
    animation: 
      zoomIn 0.1s forwards, 
      flipShake 0.05s 0.1s alternate 6;
  }

  /* ズームの動き */
  @keyframes zoomIn {
    0% { transform: scale(0.01); }
    100% { transform: scale(1.5); } /* 1.5倍まで拡大 */
  }

  /* 反転の動き（拡大したサイズを維持したまま反転） */
  @keyframes flipShake {
    0% { transform: scaleX(1.5) scaleY(1.5); }
    100% { transform: scaleX(-1.5) scaleY(1.5); }
  }
</style>
</head>
<body>

<img id="img-a" src="imageA.jpg" alt="画像A">
<img id="img-b" src="imageB.jpg" alt="画像B">

<script>
  // ページ内の画像が「完全に」読み込まれてからタイマーをスタートさせる
  window.addEventListener('load', () => {
    const imgA = document.getElementById('img-a');
    const imgB = document.getElementById('img-b');

    // ピッタリ2秒後（2000ミリ秒後）に発動
    setTimeout(() => {
      imgA.style.display = 'none'; // 画像Aを消す
      imgB.classList.add('scare-action'); // 画像Bにアニメーションを一気に適用する
    }, 2000);
  });
</script>

</body>
</html>
