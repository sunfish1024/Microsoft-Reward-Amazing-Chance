<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読み込み中...</title>
<style>
  /* 画面全体の設定 */
  body {
    margin: 0;
    overflow: hidden; /* はみ出した部分を隠す */
    background-color: #000;
  }

  /* 画像A：最初の2秒間、画面いっぱいに表示されるダミー画像 */
  #image-a {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover; /* 画面全体を覆うように表示 */
    z-index: 10;
  }

  /* 画像Bの枠：急接近（ズーム）の動きを担当 */
  #image-b-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: none; /* 最初は隠しておく */
    justify-content: center;
    align-items: center;
    transform: scale(0.01); /* 最初は点のように小さくしておく */
    transition: transform 0.1s ease-in; /* 0.1秒で急激にズーム */
    z-index: 20;
  }

  /* ズーム発動時のクラス */
  .zoom {
    transform: scale(1.5) !important; /* 画面を少しはみ出すくらいまで一気に拡大 */
  }

  /* 画像B本体：左右反転の動きを担当 */
  #image-b {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 左右反転を繰り返すアニメーション（0.05秒の反転を6回） */
  .flip {
    animation: flipAnim 0.05s alternate 6;
  }

  /* 反転のキーフレーム設定 */
  @keyframes flipAnim {
    0% { transform: scaleX(1); }
    100% { transform: scaleX(-1); }
  }
</style>
</head>
<body>

<img id="image-a" src="imageA.jpg" alt="ダミー画像">

<div id="image-b-wrapper">
  <img id="image-b" src="imageB.jpg" alt="びっくり画像">
</div>

<script>
  // ページ内の画像などがすべて読み込まれたらタイマー開始
  window.onload = function() {
    
    // 2秒（2000ミリ秒）経過後に中身を実行
    setTimeout(function() {
      
      // 1. 画像Aを消す
      document.getElementById('image-a').style.display = 'none';
      
      // 2. 画像Bのラッパーを表示させる（この時点ではまだ極小サイズ）
      const wrapper = document.getElementById('image-b-wrapper');
      wrapper.style.display = 'flex';
      
      // 3. ほんの一瞬待ってからズームさせる（すぐにzoomを付けるとアニメーションしないため）
      setTimeout(function() {
        wrapper.classList.add('zoom');
      }, 10);
      
      // 4. ズーム完了後（約0.1秒後）に、画像B本体を左右反転させる
      setTimeout(function() {
        document.getElementById('image-b').classList.add('flip');
      }, 110); // ズーム時間100ms + 10msの余裕
      
    }, 2000); // 最初の待ち時間（2秒）
  };
</script>

</body>
</html>
